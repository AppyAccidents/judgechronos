<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f0f0f0;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    
    .status-dot.disconnected {
      background: #ef4444;
    }
    
    .current-site {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .current-site h3 {
      margin: 0 0 8px 0;
      font-size: 12px;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 0.5px;
    }
    
    .site-name {
      font-size: 14px;
      font-weight: 500;
      color: #1e293b;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .site-url {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .stat {
      background: #f8fafc;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #1e293b;
    }
    
    .stat-label {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">⏱</div>
    <h1 class="title">Judge Chronos</h1>
  </div>
  
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected to app</span>
  </div>
  
  <div class="current-site">
    <h3>Current Site</h3>
    <div class="site-name" id="siteName">Loading...</div>
    <div class="site-url" id="siteUrl">-</div>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="sessionTime">0:00</div>
      <div class="stat-label">This Session</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="todayTime">0:00</div>
      <div class="stat-label">Today</div>
    </div>
  </div>
  
  <div class="actions">
    <button class="btn-primary" id="openApp">Open App</button>
    <button class="btn-secondary" id="pauseTracking">Pause</button>
  </div>
  
  <div class="footer">
    Automatic time tracking for your productivity
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
